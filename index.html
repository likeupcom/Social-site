<!DOCTYPE html>
<html>
<head>
  <title>Social Hub</title>

  <style>
    body {
      font-family: Arial;
      text-align: center;
      background: #f2f2f2;
    }

    h1 {
      margin-top: 30px;
    }

    .container {
      margin-top: 50px;
    }

    .box {
      display: inline-block;
      width: 200px;
      padding: 20px;
      margin: 15px;
      border-radius: 15px;
      color: white;
      font-size: 20px;
      text-decoration: none;
    }

    .youtube {
      background: #FF0000;
    }

    .tiktok {
      background: #000000;
    }

    .instagram {
      background: linear-gradient(45deg, #f9ce34, #ee2a7b, #6228d7);
    }

    .box:hover {
      transform: scale(1.05);
      transition: 0.3s;
    }
  </style>

</head>

<body>

<h1>👋 Welcome to Social Hub</h1>
<p>Select your platform below</p>

<div class="container">

  <a class="box youtube" href="youtube.html">YouTube</a>

  <a class="box tiktok" href="tiktok.html">TikTok</a>

  <a class="box instagram" href="instagram.html">Instagram</a>

</div>

</body>
</html>
